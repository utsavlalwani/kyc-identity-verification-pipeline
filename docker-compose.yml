version: "3.9"

services:
 db:
  image: postgres:16-alpine
  environment:
   POSTGRES_DB: kyc_pipeline
   POSTGRES_USER: postgres
   POSTGRES_PASSWORD: password
  ports:
   - "5433:5432" # 5433 so it doesn't clash with LoanFlow's DB on 5432
  volumes:
   - pgdata_kyc:/var/lib/postgresql/data
  healthcheck:
   test: ["CMD-SHELL", "pg_isready -U postgres"]
   interval: 5s
   timeout: 5s
   retries: 5

 api:
  build: .
  ports:
   - "8001:8001" # 8001 so it doesn't clash with LoanFlow on 8000
  env_file:
   - .env
  environment:
   DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/kyc_pipeline
  depends_on:
   db:
    condition: service_healthy
  volumes:
   - .:/app
   - kyc_uploads:/app/local_uploads
  command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

volumes:
 pgdata_kyc:
 kyc_uploads: